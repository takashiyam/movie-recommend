<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Local Code Agent</title>
<style>
:root {
  --bg-primary: #1a1a2e;
  --bg-secondary: #16213e;
  --bg-chat: #0f0f23;
  --bg-input: #1a1a2e;
  --bg-user: #2d5a8e;
  --bg-assistant: #1e1e3a;
  --bg-tool: #1a2332;
  --bg-tool-result: #172017;
  --bg-tool-error: #2d1717;
  --text-primary: #e8e8f0;
  --text-secondary: #8888a8;
  --text-tool: #7ec8e3;
  --text-success: #6fcf97;
  --text-error: #eb5757;
  --accent: #6c63ff;
  --accent-hover: #5a52d5;
  --border: #2a2a4a;
  --scrollbar: #2a2a4a;
  --scrollbar-hover: #3a3a5a;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans JP', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-hover); }

/* Header */
.header {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo {
  width: 32px;
  height: 32px;
  background: var(--accent);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: bold;
  color: white;
}

.header h1 {
  font-size: 16px;
  font-weight: 600;
}

.header .badge {
  font-size: 11px;
  color: var(--text-secondary);
  background: var(--bg-primary);
  padding: 2px 8px;
  border-radius: 10px;
}

.header-actions {
  display: flex;
  gap: 8px;
}

.btn-icon {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.15s;
}

.btn-icon:hover {
  background: var(--bg-primary);
  color: var(--text-primary);
}

/* Chat area */
.chat-container {
  flex: 1;
  overflow-y: auto;
  padding: 0;
  background: var(--bg-chat);
}

.chat-inner {
  max-width: 820px;
  margin: 0 auto;
  padding: 24px 20px 100px;
}

/* Welcome */
.welcome {
  text-align: center;
  padding: 60px 20px;
}

.welcome h2 {
  font-size: 24px;
  margin-bottom: 8px;
  color: var(--text-primary);
}

.welcome p {
  color: var(--text-secondary);
  font-size: 14px;
  line-height: 1.6;
}

.welcome .suggestions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-top: 24px;
}

.suggestion {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 8px 16px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.15s;
}

.suggestion:hover {
  background: var(--bg-input);
  color: var(--text-primary);
  border-color: var(--accent);
}

/* Messages */
.message {
  margin-bottom: 20px;
  animation: fadeIn 0.2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.message-user {
  display: flex;
  justify-content: flex-end;
}

.message-user .bubble {
  background: var(--bg-user);
  border-radius: 16px 16px 4px 16px;
  padding: 10px 16px;
  max-width: 75%;
  white-space: pre-wrap;
  word-break: break-word;
  font-size: 14px;
  line-height: 1.6;
}

.message-assistant {
  display: flex;
  gap: 10px;
  align-items: flex-start;
}

.avatar {
  width: 28px;
  height: 28px;
  background: var(--accent);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: bold;
  color: white;
  flex-shrink: 0;
  margin-top: 2px;
}

.message-assistant .bubble {
  background: var(--bg-assistant);
  border-radius: 4px 16px 16px 16px;
  padding: 12px 16px;
  max-width: 85%;
  font-size: 14px;
  line-height: 1.7;
}

.message-assistant .bubble p { margin: 0 0 8px; }
.message-assistant .bubble p:last-child { margin-bottom: 0; }
.message-assistant .bubble ul, .message-assistant .bubble ol { padding-left: 20px; margin: 8px 0; }
.message-assistant .bubble li { margin: 4px 0; }
.message-assistant .bubble h1, .message-assistant .bubble h2, .message-assistant .bubble h3 {
  margin: 12px 0 6px;
  color: var(--text-primary);
}
.message-assistant .bubble h1 { font-size: 18px; }
.message-assistant .bubble h2 { font-size: 16px; }
.message-assistant .bubble h3 { font-size: 14px; }

.message-assistant .bubble code {
  background: rgba(255, 255, 255, 0.08);
  padding: 1px 5px;
  border-radius: 3px;
  font-family: 'Menlo', 'Consolas', monospace;
  font-size: 13px;
}

.message-assistant .bubble pre {
  background: rgba(0, 0, 0, 0.3);
  border-radius: 8px;
  padding: 12px;
  margin: 8px 0;
  overflow-x: auto;
}

.message-assistant .bubble pre code {
  background: none;
  padding: 0;
  font-size: 12px;
  line-height: 1.5;
}

/* Typing indicator */
.typing {
  display: inline-block;
  width: 6px;
  height: 14px;
  background: var(--accent);
  border-radius: 2px;
  animation: blink 0.7s infinite;
  vertical-align: text-bottom;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.2; }
}

/* Tool calls */
.tool-call {
  background: var(--bg-tool);
  border: 1px solid rgba(126, 200, 227, 0.15);
  border-radius: 8px;
  margin: 8px 0;
  font-size: 13px;
  overflow: hidden;
}

.tool-call-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  background: rgba(126, 200, 227, 0.06);
  cursor: pointer;
  user-select: none;
}

.tool-call-header .icon { color: var(--text-tool); font-size: 12px; }
.tool-call-header .name { color: var(--text-tool); font-weight: 500; }
.tool-call-header .chevron {
  margin-left: auto;
  color: var(--text-secondary);
  font-size: 11px;
  transition: transform 0.15s;
}
.tool-call-header.expanded .chevron { transform: rotate(90deg); }

.tool-call-body {
  display: none;
  padding: 8px 12px;
  font-family: 'Menlo', 'Consolas', monospace;
  font-size: 12px;
  color: var(--text-secondary);
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 200px;
  overflow-y: auto;
}

.tool-call-body.show { display: block; }

.tool-result {
  background: var(--bg-tool-result);
  border: 1px solid rgba(111, 207, 151, 0.12);
  border-radius: 8px;
  margin: 8px 0;
  font-size: 13px;
  overflow: hidden;
}

.tool-result.error {
  background: var(--bg-tool-error);
  border-color: rgba(235, 87, 87, 0.15);
}

.tool-result-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  cursor: pointer;
  user-select: none;
}

.tool-result-header .icon { font-size: 12px; }
.tool-result-header .status { font-weight: 500; font-size: 12px; }
.tool-result.error .tool-result-header .icon,
.tool-result.error .tool-result-header .status { color: var(--text-error); }
.tool-result:not(.error) .tool-result-header .icon,
.tool-result:not(.error) .tool-result-header .status { color: var(--text-success); }
.tool-result-header .chevron {
  margin-left: auto;
  color: var(--text-secondary);
  font-size: 11px;
  transition: transform 0.15s;
}
.tool-result-header.expanded .chevron { transform: rotate(90deg); }

.tool-result-body {
  display: none;
  padding: 8px 12px;
  font-family: 'Menlo', 'Consolas', monospace;
  font-size: 12px;
  color: var(--text-secondary);
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 300px;
  overflow-y: auto;
}

.tool-result-body.show { display: block; }

/* Input area */
.input-area {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: linear-gradient(transparent, var(--bg-chat) 20px);
  padding: 20px 20px 20px;
}

.input-wrapper {
  max-width: 820px;
  margin: 0 auto;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 4px;
  display: flex;
  align-items: flex-end;
  transition: border-color 0.15s;
}

.input-wrapper:focus-within {
  border-color: var(--accent);
}

.input-wrapper textarea {
  flex: 1;
  background: none;
  border: none;
  color: var(--text-primary);
  font-family: inherit;
  font-size: 14px;
  padding: 10px 12px;
  resize: none;
  outline: none;
  min-height: 20px;
  max-height: 200px;
  line-height: 1.5;
}

.input-wrapper textarea::placeholder {
  color: var(--text-secondary);
}

.send-btn {
  background: var(--accent);
  border: none;
  color: white;
  width: 36px;
  height: 36px;
  border-radius: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
  margin: 2px;
}

.send-btn:hover { background: var(--accent-hover); }
.send-btn:disabled { opacity: 0.4; cursor: default; }

.send-btn svg {
  width: 18px;
  height: 18px;
}

/* Status bar */
.status-bar {
  text-align: center;
  padding: 4px;
  font-size: 11px;
  color: var(--text-secondary);
}

.status-dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  margin-right: 4px;
  vertical-align: middle;
}

.status-dot.connected { background: var(--text-success); }
.status-dot.disconnected { background: var(--text-error); }

/* Responsive */
@media (max-width: 640px) {
  .chat-inner { padding: 16px 12px 100px; }
  .message-user .bubble { max-width: 90%; }
  .message-assistant .bubble { max-width: 95%; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">C</div>
    <h1>Local Code Agent</h1>
    <span class="badge" id="modelBadge">connecting...</span>
  </div>
  <div class="header-actions">
    <button class="btn-icon" onclick="clearChat()" title="New chat">New Chat</button>
  </div>
</div>

<div class="chat-container" id="chatContainer">
  <div class="chat-inner" id="chatInner">
    <div class="welcome" id="welcome">
      <h2>Local Code Agent</h2>
      <p>AIコーディングアシスタント<br>ファイル操作、コード検索、コマンド実行をサポートします</p>
      <div class="suggestions">
        <div class="suggestion" onclick="sendSuggestion('このプロジェクトの構造を見せて')">プロジェクト構造を見せて</div>
        <div class="suggestion" onclick="sendSuggestion('README.mdを読んで')">README.mdを読んで</div>
        <div class="suggestion" onclick="sendSuggestion('git statusを確認して')">git status を確認</div>
        <div class="suggestion" onclick="sendSuggestion('TODOコメントを検索して')">TODOを検索</div>
      </div>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-wrapper">
    <textarea
      id="userInput"
      placeholder="メッセージを入力... (Enter で送信, Shift+Enter で改行)"
      rows="1"
      autofocus
    ></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
  <div class="status-bar">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">Connecting...</span>
  </div>
</div>

<script>
// Simple markdown parser (no dependencies)
const md = (() => {
  function escapeHtml(text) {
    return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function render(src) {
    if (!src) return '';
    let html = '';
    // Split into blocks by code fences first
    const parts = src.split(/(```[\s\S]*?```)/g);
    for (const part of parts) {
      if (part.startsWith('```')) {
        const match = part.match(/^```(\w*)\n?([\s\S]*?)```$/);
        if (match) {
          html += `<pre><code>${escapeHtml(match[2].trimEnd())}</code></pre>`;
        } else {
          html += `<pre><code>${escapeHtml(part)}</code></pre>`;
        }
      } else {
        html += renderInline(part);
      }
    }
    return html;
  }

  function renderInline(src) {
    return src
      // Headers
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^# (.+)$/gm, '<h1>$1</h1>')
      // Bold + italic
      .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      // Inline code
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      // Unordered list
      .replace(/^[-*] (.+)$/gm, '<li>$1</li>')
      // Line breaks (double newline = paragraph)
      .replace(/\n{2,}/g, '</p><p>')
      // Single newline to <br>
      .replace(/\n/g, '<br>')
      // Wrap in paragraphs
      .replace(/^(?!<[hlu])/, '<p>')
      .replace(/(?<![>])$/, '</p>')
      // Clean up empty paragraphs
      .replace(/<p><\/p>/g, '')
      // Wrap consecutive <li> in <ul>
      .replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>')
      .replace(/<\/ul>\s*<ul>/g, '');
  }

  return { render };
})();

// --- State ---
let ws = null;
let isProcessing = false;
let currentAssistantBubble = null;
let currentTextBuffer = '';
let reconnectAttempts = 0;

// --- WebSocket ---
function connect() {
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${protocol}//${location.host}/ws`);

  ws.onopen = () => {
    reconnectAttempts = 0;
    setStatus('connected', 'Connected');
  };

  ws.onclose = () => {
    setStatus('disconnected', 'Disconnected');
    if (reconnectAttempts < 10) {
      const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 10000);
      reconnectAttempts++;
      setTimeout(connect, delay);
    }
  };

  ws.onerror = () => {
    setStatus('disconnected', 'Connection error');
  };

  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    handleMessage(data);
  };
}

function setStatus(state, text) {
  document.getElementById('statusDot').className = `status-dot ${state}`;
  document.getElementById('statusText').textContent = text;
}

// --- Message handlers ---
function handleMessage(data) {
  switch (data.type) {
    case 'config':
      document.getElementById('modelBadge').textContent = `${data.backend} / ${data.model}`;
      break;

    case 'text_delta':
      if (!currentAssistantBubble) {
        currentAssistantBubble = addAssistantMessage('');
        currentTextBuffer = '';
      }
      currentTextBuffer += data.text;
      currentAssistantBubble.innerHTML = md.render(currentTextBuffer) + '<span class="typing"></span>';
      scrollToBottom();
      break;

    case 'tool_call':
      addToolCall(data.name, data.arguments);
      scrollToBottom();
      break;

    case 'tool_result':
      addToolResult(data.name, data.output, data.is_error);
      scrollToBottom();
      break;

    case 'done':
      if (currentAssistantBubble) {
        currentAssistantBubble.innerHTML = md.render(currentTextBuffer);
      }
      finishResponse();
      break;

    case 'cleared':
      document.getElementById('chatInner').innerHTML = '';
      document.getElementById('chatInner').appendChild(createWelcome());
      break;

    case 'error':
      addErrorMessage(data.message);
      finishResponse();
      break;
  }
}

function finishResponse() {
  currentAssistantBubble = null;
  currentTextBuffer = '';
  isProcessing = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('userInput').focus();
}

// --- UI helpers ---
function addUserMessage(text) {
  hideWelcome();
  const div = document.createElement('div');
  div.className = 'message message-user';
  div.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
  document.getElementById('chatInner').appendChild(div);
  scrollToBottom();
}

function addAssistantMessage(html) {
  const div = document.createElement('div');
  div.className = 'message message-assistant';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = html || '<span class="typing"></span>';
  div.innerHTML = '<div class="avatar">A</div>';
  div.appendChild(bubble);
  document.getElementById('chatInner').appendChild(div);
  scrollToBottom();
  return bubble;
}

function addToolCall(name, args) {
  const div = document.createElement('div');
  div.className = 'tool-call';
  const argsStr = typeof args === 'string' ? args : JSON.stringify(args, null, 2);
  div.innerHTML = `
    <div class="tool-call-header" onclick="toggleBody(this)">
      <span class="icon">&#9881;</span>
      <span class="name">${escapeHtml(name)}</span>
      <span class="chevron">&#9654;</span>
    </div>
    <div class="tool-call-body">${escapeHtml(argsStr)}</div>
  `;
  document.getElementById('chatInner').appendChild(div);
}

function addToolResult(name, output, isError) {
  const div = document.createElement('div');
  div.className = `tool-result${isError ? ' error' : ''}`;
  const icon = isError ? '&#10007;' : '&#10003;';
  const status = isError ? 'Error' : 'Done';
  div.innerHTML = `
    <div class="tool-result-header" onclick="toggleBody(this)">
      <span class="icon">${icon}</span>
      <span class="status">${status}: ${escapeHtml(name)}</span>
      <span class="chevron">&#9654;</span>
    </div>
    <div class="tool-result-body">${escapeHtml(output)}</div>
  `;
  document.getElementById('chatInner').appendChild(div);
}

function addErrorMessage(msg) {
  const div = document.createElement('div');
  div.className = 'message message-assistant';
  div.innerHTML = `<div class="avatar" style="background:var(--text-error)">!</div>
    <div class="bubble" style="border: 1px solid rgba(235,87,87,0.2)">${escapeHtml(msg)}</div>`;
  document.getElementById('chatInner').appendChild(div);
}

function toggleBody(header) {
  header.classList.toggle('expanded');
  const body = header.nextElementSibling;
  body.classList.toggle('show');
}

function escapeHtml(text) {
  const el = document.createElement('span');
  el.textContent = text;
  return el.innerHTML;
}

function scrollToBottom() {
  const container = document.getElementById('chatContainer');
  requestAnimationFrame(() => {
    container.scrollTop = container.scrollHeight;
  });
}

function hideWelcome() {
  const w = document.getElementById('welcome');
  if (w) w.remove();
}

function createWelcome() {
  const div = document.createElement('div');
  div.className = 'welcome';
  div.id = 'welcome';
  div.innerHTML = `
    <h2>Local Code Agent</h2>
    <p>AIコーディングアシスタント<br>ファイル操作、コード検索、コマンド実行をサポートします</p>
    <div class="suggestions">
      <div class="suggestion" onclick="sendSuggestion('このプロジェクトの構造を見せて')">プロジェクト構造を見せて</div>
      <div class="suggestion" onclick="sendSuggestion('README.mdを読んで')">README.mdを読んで</div>
      <div class="suggestion" onclick="sendSuggestion('git statusを確認して')">git status を確認</div>
      <div class="suggestion" onclick="sendSuggestion('TODOコメントを検索して')">TODOを検索</div>
    </div>`;
  return div;
}

// --- Actions ---
function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isProcessing || !ws || ws.readyState !== WebSocket.OPEN) return;

  addUserMessage(text);
  input.value = '';
  autoResize(input);
  isProcessing = true;
  document.getElementById('sendBtn').disabled = true;

  ws.send(JSON.stringify({ type: 'message', text }));
}

function sendSuggestion(text) {
  const input = document.getElementById('userInput');
  input.value = text;
  sendMessage();
}

function clearChat() {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'message', text: '/clear' }));
  }
}

// --- Input handling ---
const input = document.getElementById('userInput');

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

input.addEventListener('input', () => autoResize(input));

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
}

// --- Init ---
connect();
</script>
</body>
</html>
