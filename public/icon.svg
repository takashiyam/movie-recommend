<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="112" fill="#0f0f14"/>
  <!-- TV body -->
  <rect x="96" y="120" width="320" height="220" rx="24" fill="#1a1a24" stroke="#6366f1" stroke-width="10"/>
  <!-- Screen -->
  <rect x="120" y="144" width="272" height="172" rx="12" fill="#22222f"/>
  <!-- Screen gradient glow -->
  <rect x="120" y="144" width="272" height="172" rx="12" fill="url(#screenGlow)" opacity="0.3"/>
  <defs>
    <linearGradient id="screenGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <!-- Play triangle on screen -->
  <polygon points="224,200 224,268 284,234" fill="#6366f1" opacity="0.8"/>
  <!-- TV stand -->
  <rect x="200" y="348" width="112" height="12" rx="6" fill="#6366f1"/>
  <!-- Stand legs -->
  <rect x="168" y="364" width="80" height="10" rx="5" fill="#2a2a3a" transform="rotate(-8, 208, 369)"/>
  <rect x="264" y="364" width="80" height="10" rx="5" fill="#2a2a3a" transform="rotate(8, 304, 369)"/>
  <!-- JP text -->
  <text x="256" y="430" text-anchor="middle" font-size="48" font-weight="800" font-family="sans-serif" fill="#6366f1">ドラマ</text>
</svg>
